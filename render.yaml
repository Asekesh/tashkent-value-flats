services:
  - type: web
    name: tashkent-value-flats
    runtime: python
    rootDir: backend
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: python3 -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tashkent-value-flats-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://tashkent-value-flats.onrender.com
      - key: ALLOW_LIVE_SCRAPING
        value: false
      - key: SEED_FIXTURES_ON_STARTUP
        value: true

databases:
  - name: tashkent-value-flats-db
    databaseName: tashkent_value_flats
    user: tashkent_value_flats
    plan: free
    region: frankfurt
