<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}{% endblock %} · Ташкент Недвижимость</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #f1f5f9;
        color: #0f172a;
        line-height: 1.6;
      }
      a { color: #2563eb; }
      main.legal {
        max-width: 760px;
        margin: 0 auto;
        padding: 32px 24px 48px;
      }
      .back { font-size: 14px; margin: 0 0 18px; }
      article {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 28px 30px;
      }
      h1 { font-size: 24px; margin: 0 0 6px; }
      h2 { font-size: 17px; margin: 26px 0 8px; }
      p, li { font-size: 15px; }
      .updated { color: #64748b; font-size: 13px; margin: 0 0 18px; }
      .site-footer {
        border-top: 1px solid #e2e8f0;
        margin-top: 28px;
        padding: 22px 24px;
        text-align: center;
      }
      .site-footer nav {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        justify-content: center;
        margin-bottom: 10px;
      }
      .site-footer nav a { font-size: 13px; text-decoration: none; }
      .site-footer nav a:hover { text-decoration: underline; }
      .site-footer p {
        color: #94a3b8;
        font-size: 12px;
        margin: 0 auto;
        max-width: 620px;
      }
    </style>
  </head>
  <body>
    <main class="legal">
      <p class="back"><a href="/">← На главную</a></p>
      <article>{% block content %}{% endblock %}</article>
    </main>
    {% include "_footer.html" %}
  </body>
</html>
