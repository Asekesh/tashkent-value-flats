services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tashkent_flats
      POSTGRES_USER: tashkent
      POSTGRES_PASSWORD: tashkent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://tashkent:tashkent@postgres:5432/tashkent_flats
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  postgres_data:

